<svg xmlns="http://www.w3.org/2000/svg" width="960" height="260" viewBox="0 0 960 260" role="img" aria-labelledby="title desc">
  <title id="title">reposcanner logo</title>
  <desc id="desc">A repository graph under a radar scan beam with the reposcanner wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="960" height="260" rx="32" fill="url(#bg)"/>
  <g transform="translate(78 38)">
    <circle cx="92" cy="92" r="86" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <circle cx="92" cy="92" r="62" fill="none" stroke="#1e293b" stroke-width="2"/>
    <circle cx="92" cy="92" r="34" fill="none" stroke="#1e293b" stroke-width="2"/>
    <path d="M92 92 L176 54 A86 86 0 0 1 161 147 Z" fill="url(#beam)" opacity="0.88" filter="url(#glow)"/>
    <path d="M33 129 L67 83 L111 116 L148 62" fill="none" stroke="#e5e7eb" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="33" cy="129" r="14" fill="#111827" stroke="#38bdf8" stroke-width="7"/>
    <circle cx="67" cy="83" r="14" fill="#111827" stroke="#a78bfa" stroke-width="7"/>
    <circle cx="111" cy="116" r="14" fill="#111827" stroke="#34d399" stroke-width="7"/>
    <circle cx="148" cy="62" r="14" fill="#111827" stroke="#facc15" stroke-width="7"/>
    <line x1="92" y1="92" x2="176" y2="54" stroke="#67e8f9" stroke-width="2" opacity="0.85"/>
  </g>
  <g transform="translate(286 84)">
    <text x="0" y="46" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="58" font-weight="800">reposcanner</text>
    <text x="2" y="92" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="500">local metadata, anonymization, sample QA, and sale-readiness scanning</text>
  </g>
</svg>
